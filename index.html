<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Rota 1.0</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header class="header">

<div class="logo-box">
⚡📍
</div>

<h1>E-Rota</h1>

<p>Elektrikli Yolculukların Akıllı Rotası</p>

</header>

<main>

<section class="card">

<h2>Giriş Yap</h2>

<input
type="email"
id="email"
placeholder="E-Posta">

<input
type="password"
id="password"
placeholder="Şifre">

<button id="loginBtn">
Giriş Yap
</button>

<button id="registerBtn">
Kayıt Ol
</button>

</section>

<section class="card">

<h2>Harita</h2>

<div id="mapContainer"></div>

</section>

</main>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/map.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
