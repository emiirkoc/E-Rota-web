<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Rota</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div class="app">

<!-- ANA SAYFA -->

<section id="homePage" class="page active">

<div class="top-search">

<input
type="text"
placeholder="Nereye gitmek istiyorsunuz?">

</div>

<div id="map"></div>

<div class="route-card">

<h2>⚡ E-Rota</h2>

<p>
Elektrikli yolculukların akıllı rotası
</p>

<button id="routeBtn">
Rotayı Başlat
</button>

</div>

<nav class="bottom-nav">

<button class="nav-btn active" data-page="homePage">
🏠
</button>

<button class="nav-btn" data-page="routePage">
🗺️
</button>

<button class="nav-btn" data-page="stationsPage">
⚡
</button>

<button class="nav-btn" data-page="profilePage">
👤
</button>

</nav>

</section>

<!-- ROTA -->

<section id="routePage" class="page">

<div class="content">

<h2>Rota Planla</h2>

<input
class="input"
placeholder="Başlangıç Noktası">

<input
class="input"
placeholder="Varış Noktası">

<button class="green-btn">
Rota Oluştur
</button>

</div>

</section>

<!-- İSTASYONLAR -->

<section id="stationsPage" class="page">

<div class="content">

<h2>İstasyonlar</h2>

<div id="stationsList"></div>

</div>

</section>

<!-- PROFİL -->

<section id="profilePage" class="page">

<div class="content">

<h2>Profil</h2>

<p>Emirhan Koç</p>

</div>

</section>

<!-- ALT MENÜ -->

<nav class="bottom-nav">


</nav>

</div>

<script src="js/stations.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>

</body>
</html>
