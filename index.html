<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Rota</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js">
</script>

</head>

<body>

<div class="mobile-app">

<!-- HARİTA SAYFASI -->

<section id="homePage" class="page active">

<div class="top-search">

<button class="menu-btn">
☰
</button>

<input
type="text"
placeholder="Nereye gitmek istiyorsunuz?">

<button class="filter-btn">
⚙
</button>

</div>

<div id="map"></div>

<button class="location-btn">
📍
</button>

<div class="route-card">

<h2>
4 sa 35 dk
<span>(356 km)</span>
</h2>

<p>
3 şarj molası • Tahmini varış 15:42
</p>

<div class="battery-info">

Batarya varışta:
<strong>%18</strong>

</div>

<button class="start-route-btn">
Rotayı Başlat ➜
</button>

</div>

</section>

<!-- ROTA SAYFASI -->

<section id="routePage" class="page">

<div class="page-card">

<h2>Rota Planla</h2>

<input
class="input"
placeholder="Başlangıç Noktası">

<input
class="input"
placeholder="Varış Noktası">

<div class="battery-box">

<p>Batarya %65</p>

<input
type="range"
min="1"
max="100"
value="65">

</div>

<button class="green-btn">
Rota Oluştur
</button>

</div>

</section>

<!-- İSTASYONLAR -->

<section id="stationsPage" class="page">

<h2 class="page-title">
Yakındaki İstasyonlar
</h2>

<div id="stationsList"></div>

</section>

<!-- PROFİL -->

<section id="profilePage" class="page">

<div class="profile-card">

<h3>Emirhan Koç</h3>

<p>E-Rota Kullanıcısı</p>

</div>

<div class="menu-item">
🚗 Araçlarım
</div>

<div class="menu-item">
⭐ Favori İstasyonlar
</div>

<div class="menu-item">
🛣 Geçmiş Rotalar
</div>

<div class="menu-item">
⚙ Ayarlar
</div>

</section>

<!-- ALT MENÜ -->

<nav class="bottom-nav">

<button
class="nav-btn active"
data-page="homePage">

🏠

</button>

<button
class="nav-btn"
data-page="routePage">

🗺️

</button>

<button
class="nav-btn"
data-page="stationsPage">

⚡

</button>

<button
class="nav-btn"
data-page="profilePage">

👤

</button>

</nav>

</div>

<script src="js/map.js"></script>
<script src="js/app.js"></script>

</body>
</html>
