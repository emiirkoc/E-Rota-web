<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Rota</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#08111f;
color:white;
}

header{
background:#0f1c30;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#3ddc84;
}

.card{

}

.button{

color:black;
text-align:center;
padding:15px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.station{
padding:10px;
border-bottom:1px solid #223754;
}
</style>

</head>
<body>

<header>
⚡ E-Rota
</header>

<div class="card">

</div>

<div class="card">
<h3>Batarya Durumu</h3>
<p>🔋 %68</p>
<p>🚗 Tahmini menzil: 268 km</p>
</div>

<div class="card">
<h3>Yakındaki İstasyonlar</h3>

<div class="station">⚡ Trugo - 150 kW</div>
<div class="station">⚡ ZES - 120 kW</div>
<div class="station">⚡ Eşarj - 180 kW</div>

</div>

<div class="card">
<a class="button" href="#">
🗺 Rota Planla
</a>
</div>

</html>
