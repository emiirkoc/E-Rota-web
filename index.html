<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Rota V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#08111f;
color:white;
padding-bottom:90px;
}

.header{
padding:25px;
font-size:28px;
font-weight:700;
text-align:center;
color:#42d66b;
}

.card{
background:#13233b;
margin:15px;
padding:18px;
border-radius:18px;
}

.card h3{
margin-bottom:10px;
}

.station{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.station:last-child{
border:none;
}

.button{
display:block;
background:#42d66b;
color:#000;
padding:15px;
text-align:center;
border-radius:15px;
font-weight:bold;
text-decoration:none;
margin-top:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#0f1c30;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,.08);
}

.nav-item{
text-align:center;
font-size:13px;
color:#ccc;
}

.active{
color:#42d66b;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">⚡ E-Rota</div>

<div class="card">
<h3>Merhaba Emirhan 👋</h3>
<p>Elektrikli yolculukların akıllı rotası.</p>
</div>

<div class="card">
<h3>🔋 Batarya</h3>
<p>%68</p>
<p>Tahmini menzil: 268 km</p>
</div>

<div class="card">
<h3>⚡ Yakındaki İstasyonlar</h3>

<div class="station">Trugo DC - 150 kW</div>
<div class="station">ZES DC - 120 kW</div>
<div class="station">Eşarj Ultra - 180 kW</div>

<a href="#" class="button">
🗺 Rota Planla
</a>
</div>

<div class="card">
<h3>👤 Profil</h3>
<p>Premium Üyelik: Kapalı</p>
</div>

<div class="bottom-nav">

<div class="nav-item active">
🏠<br>
Ana Sayfa
</div>

<div class="nav-item">
🗺<br>
Harita
</div>

<div class="nav-item">
⚡<br>
İstasyonlar
</div>

<div class="nav-item">
👤<br>
Profil
</div>

</div>

</body>
</html>
