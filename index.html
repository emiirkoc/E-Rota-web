<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Rota</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div class="app">

<header class="topbar">

<h1>E-Rota ⚡</h1>

<p>Elektrikli yolculukların akıllı rotası</p>

</header>

<!-- ANA SAYFA -->

<div id="homePage">

<section class="search-box">

<input
type="text"
placeholder="Nereye gitmek istiyorsunuz?">

</section>

<section class="stats">

<div class="stat-card">
⚡ 128 İstasyon
</div>

<div class="stat-card">
🟢 84 Boş
</div>

<div class="stat-card">
🔴 44 Dolu
</div>

</section>

<div class="station-card">

<h3>⚡ En Yakın İstasyon</h3>

<p>Trugo</p>

<p>0.8 km uzaklıkta</p>

<button>
Detayları Gör
</button>

</div>

<div class="station-card">

<h3>🔋 Batarya Durumu</h3>

<p>%76</p>

</div>

</div>

<!-- HARİTA SAYFASI -->

<div id="mapPage">

<div id="map"></div>

</div>

<!-- İSTASYONLAR SAYFASI -->

<div id="stationsPage" style="display:none">

<h2 style="padding:15px">
Yakındaki İstasyonlar
</h2>

<div id="stationsList"></div>

</div>

<!-- PROFİL SAYFASI -->

<div id="profilePage" style="display:none">

<div class="station-card">

<h3>👤 Emirhan Koç</h3>

<p>E-Rota Kullanıcısı</p>

</div>

<div class="station-card">
⭐ Favori İstasyonlar
</div>

<div class="station-card">
🛣️ Geçmiş Rotalar
</div>

<div class="station-card">
⚙️ Ayarlar
</div>

<div class="station-card">
🚪 Çıkış Yap
</div>

</div>

<!-- ALT MENÜ -->

<nav class="bottom-nav">

<button onclick="showPage('homePage')">
🏠
</button>

<button onclick="showPage('mapPage')">
🗺️
</button>

<button onclick="showPage('stationsPage')">
⚡
</button>

<button onclick="showPage('profilePage')">
👤
</button>

</nav>

</div>

<script src="js/map.js"></script>
<script src="js/app.js"></script>

</body>

</html>
